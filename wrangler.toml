name = "growth-farm"
main = "dist/index.js"
compatibility_date = "2024-12-16"
compatibility_flags = ["nodejs_compat"]

# Cloudflare D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "growth-farm"
database_id = "9f2abfbf-3b6e-4d50-aee4-6bb5f0997d3a"

# Environment Variables
[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }

# KV Namespace for sessions (optional, for scaling)
[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "YOUR_KV_NAMESPACE_ID_HERE"
preview_id = "YOUR_KV_PREVIEW_ID_HERE"

# Build configuration
[build]
command = "npm run build"
cwd = "./"

[build.upload]
format = "modules"
main = "./dist/server/index.js"

# Triggers
[triggers]
crons = ["0 0 * * *"]

# Observability
[observability]
enabled = true
